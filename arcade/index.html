<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pepper's Arcade 🕹️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: rgba(22, 27, 34, 0.92);
      border-bottom: 1px solid #30363d;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(2px);
      position: relative;
      z-index: 2;
    }
    .site-header-left {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
    }
    .site-header h1 {
      font-size: 1.35rem;
      font-weight: normal;
      letter-spacing: 0.01em;
    }
    .site-header h1 a {
      color: #e6edf3;
      text-decoration: none;
    }
    .site-header h1 a:hover { color: #f0883e; }
    .site-header nav a {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 1.5rem;
      font-family: ui-monospace, monospace;
      transition: color 0.2s;
    }
    .site-header nav a:hover,
    .site-header nav a.active { color: #f0883e; }

    /* ── Hero ── */
    .arcade-hero {
      text-align: center;
      padding: 4rem 2rem 2rem;
      position: relative;
    }
    .arcade-hero .marquee {
      font-size: 3.5rem;
      letter-spacing: 0.12em;
      color: #f0883e;
      font-family: ui-monospace, 'Courier New', monospace;
      text-shadow: 0 0 32px rgba(240,136,62,0.4), 0 0 8px rgba(240,136,62,0.2);
      animation: flicker 4s infinite;
      user-select: none;
    }
    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.9; }
    }
    .arcade-hero .subtitle {
      margin-top: 0.75rem;
      color: #8b949e;
      font-size: 1rem;
      font-family: ui-monospace, monospace;
    }
    .arcade-hero .subtitle span {
      color: #f0883e;
    }

    /* ── Insert coin ticker ── */
    .insert-coin {
      text-align: center;
      margin: 1.5rem 0 3rem;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      color: #484f58;
      letter-spacing: 0.15em;
      animation: blink 1.2s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Grid ── */
    .arcade-grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .game-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.75rem 1.5rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(240,136,62,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .game-card:hover {
      border-color: #f0883e;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(240,136,62,0.15);
      text-decoration: none;
    }
    .game-card:hover::before { opacity: 1; }

    .game-card .icon {
      font-size: 2.6rem;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }
    .game-card .game-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #e6edf3;
      line-height: 1.3;
    }
    .game-card .game-desc {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.5;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .game-card .tag {
      display: inline-block;
      margin-top: auto;
      padding: 0.2rem 0.55rem;
      background: rgba(240,136,62,0.12);
      border: 1px solid rgba(240,136,62,0.25);
      border-radius: 999px;
      font-size: 0.7rem;
      font-family: ui-monospace, monospace;
      color: #f0883e;
      letter-spacing: 0.05em;
      width: fit-content;
    }

    /* Coming soon card */
    .game-card.soon {
      opacity: 0.45;
      pointer-events: none;
      border-style: dashed;
    }
    .game-card.soon .tag {
      background: rgba(139,148,158,0.1);
      border-color: rgba(139,148,158,0.25);
      color: #8b949e;
    }

    /* ── Section label ── */
    .section-label {
      max-width: 960px;
      margin: 0 auto 0.75rem;
      padding: 0 2rem;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #484f58;
      text-transform: uppercase;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid #21262d;
      padding: 2rem;
      text-align: center;
      color: #484f58;
      font-size: 0.8rem;
      font-family: ui-monospace, monospace;
    }
    .site-footer a { color: #8b949e; text-decoration: none; }
    .site-footer a:hover { color: #f0883e; }

    /* ── Scanlines overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header-left">
      <h1><a href="/">🌶️ pepper</a></h1>
    </div>
    <nav>
      <a href="/">blog</a>
      <a href="/radio">radio</a>
      <a href="/arcade" class="active">arcade</a>
    </nav>
  </header>

  <div class="arcade-hero">
    <div class="marquee">🕹️ PEPPER'S ARCADE 🕹️</div>
    <div class="subtitle">small games &amp; weird things &mdash; made by <span>🌶️</span></div>
  </div>

  <div class="insert-coin">— INSERT COIN TO CONTINUE —</div>

  <div class="arcade-grid" id="games-grid">
    <!-- games injected by arcade-import pipeline -->
  </div>

  <script>
    (async () => {
      const grid = document.getElementById('games-grid');
      let games = [];
      try {
        const res = await fetch('/arcade/games.json');
        games = await res.json();
      } catch (e) {
        grid.innerHTML = '<p style="color:#484f58;font-family:monospace;padding:2rem">no games loaded</p>';
        return;
      }

      if (!games.length) {
        grid.innerHTML = '<p style="color:#484f58;font-family:monospace;padding:2rem">// nothing here yet</p>';
        return;
      }

      grid.innerHTML = games.map(g => `
        <a class="game-card" href="${g.path}">
          <div class="icon">${g.icon}</div>
          <div class="game-title">${g.title}</div>
          <div class="game-desc">${g.desc}</div>
          <span class="tag">${g.tag}</span>
        </a>
      `).join('');
    })();
  </script>

  <footer class="site-footer">
    <a href="/">← back to blog</a>
    &nbsp;·&nbsp;
    <a href="/radio">radio</a>
    &nbsp;·&nbsp;
    made with 🌶️
  </footer>

</body>
</html>
