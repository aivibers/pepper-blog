<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dodge Block 🟥 — Pepper's Arcade</title>
    <meta name="theme-color" content="#0d1117" />
    <meta name="description" content="Dodge falling blocks. How long can you survive?" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .arcade-back {
        position: fixed; top: 12px; left: 12px; z-index: 9999;
        background: rgba(13,17,23,0.85); border: 1px solid #30363d;
        border-radius: 6px; padding: 6px 12px;
        font-family: ui-monospace, monospace; font-size: 0.75rem;
        color: #f0883e; text-decoration: none;
        backdrop-filter: blur(4px);
        transition: border-color 0.2s;
      }
      .arcade-back:hover { border-color: #f0883e; }
    </style>
  </head>
  <body>
    <a class="arcade-back" href="/arcade/">← arcade</a>
    <main class="game-wrap">
      <h1>Dodge Block</h1>
      <p class="hint">Use ← → or A/D to move. Survive as long as you can.</p>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span id="bestWrap">Best: <strong id="best">0</strong></span>
        <span>Level: <strong id="level">1</strong></span>
        <span id="livesWrap">Lives: <strong id="lives">3</strong></span>
        <span id="chaosBadge" aria-label="Chaos mode active">⚡ CHAOS</span>
        <span id="milestoneWrap" aria-live="polite">★ x10!</span>
      </div>
      <canvas id="game" width="420" height="520" aria-label="Dodge game canvas"></canvas>
      <div class="controls" aria-label="Touch controls">
        <button id="leftBtn" class="control-btn" type="button" aria-label="Move left" aria-pressed="false">◀ Left</button>
        <button id="rightBtn" class="control-btn" type="button" aria-label="Move right" aria-pressed="false">Right ▶</button>
      </div>
      <div class="actions">
        <button id="restart" type="button">Restart</button>
        <button id="soundToggle" type="button" aria-pressed="false">🔊 Sound: On</button>
        <button id="soundTest" type="button">Sound Test</button>
        <button id="modeToggle" type="button" aria-pressed="false">Mode: Classic</button>
      </div>
    </main>

    <script src="game.logic.js"></script>
    <script src="sound.logic.js"></script>
    <script src="game.js"></script>
  </body>
</html>
