<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pepper's Dungeon — Tests</title>
  <style>
    body { background: #1a1a2e; color: #e6edf3; font-family: 'Courier New', monospace; padding: 20px; }
    h1 { color: #ffd700; }
    .pass { color: #44ff44; }
    .fail { color: #ff4444; font-weight: bold; }
    #results { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🌶️ Pepper's Dungeon — Test Suite</h1>
  <div id="results"></div>

  <!-- Hidden canvas for engine init -->
  <div style="display:none">
    <canvas id="game-canvas" width="672" height="576"></canvas>
    <div id="title-overlay"><h1></h1><p class="subtitle"></p><p class="prompt"></p></div>
    <div id="hud-bar">
      <span id="hud-floor"></span>
      <span id="hud-score"></span>
      <span id="hud-hp"></span>
    </div>
  </div>

  <script src="../js/renderer.js"></script>
  <script src="../js/player.js"></script>
  <script src="../js/engine.js"></script>
  <script src="tests.js"></script>
</body>
</html>
